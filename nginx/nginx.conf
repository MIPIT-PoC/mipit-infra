worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # P08: Rate-limit zone — 10 req/s per client IP with burst 20.
    limit_req_zone $binary_remote_addr zone=mipit_api:10m rate=10r/s;

    upstream core_backend {
        server core:8080;
    }

    upstream ui_frontend {
        server ui:3000;
    }

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/mipit.crt;
        ssl_certificate_key /etc/nginx/certs/mipit.key;
        ssl_protocols       TLSv1.3;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_session_tickets off;

        # P08: Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://10.43.101.28; frame-ancestors 'none';" always;

        client_max_body_size 1m;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # P08: SSE-friendly location — disable buffering, allow long-lived stream.
        # Matches both /api/events/* (recommended, scoped to events) so that the
        # general /api/ block keeps default buffering for normal REST traffic.
        location /api/events/ {
            proxy_pass http://core_backend/events/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 24h;
        }

        # API Core (rate-limited)
        location /api/ {
            limit_req zone=mipit_api burst=20 nodelay;
            proxy_pass http://core_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # UI Frontend
        location / {
            proxy_pass http://ui_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
