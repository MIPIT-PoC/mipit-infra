# Audit 3 X2 — NOTE: definitions.json sibling file is *not* loaded here.
# The actual topology is asserted by the adapters and core at startup
# (see ./README.md). Loading definitions.json would clash with the
# adapters' assertQueue() configs and produce PRECONDITION_FAILED.

loopback_users.guest = false
default_vhost = mipit
default_user = mipit
# default_pass moved out — P08 sets RABBITMQ_DEFAULT_PASS via env in docker-compose.yml.
# Keeping a literal default here as a fallback when the env var is not provided
# (PoC convenience). Override with RABBITMQ_DEFAULT_PASS env in production.
default_pass = mipit_secret

# Resource limits — fail fast under memory pressure
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 1GB
